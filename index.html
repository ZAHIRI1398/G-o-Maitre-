<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZÈOMÈTRIE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="main.js"></script>
</head>
<body>
    <div class="columns is-gapless" style="height: 100vh;">
        <!-- Barre latérale -->
        <div class="column is-2" style="background-color: #f5f5f5; height: 100%; overflow-y: auto;">
            <aside class="menu p-4">
                <div class="has-text-centered mb-4">
                    <img src="images/logo.png" alt="Logo" style="width: 150px;">
                </div>
                <p class="menu-label">
                    Outils de construction
                </p>
                <ul class="menu-list">
                    <li>
                        <div class="is-flex is-flex-direction-row is-align-items-center mt-2 mb-2">
                            <img class="btn-with-image" src="images/navigations/point.png" alt="Point" id="btn-point" style="cursor: pointer;" />
                        </div>
                    </li>
                    <li>
                        <div class="is-flex is-flex-direction-row is-align-items-center mt-2 mb-2">
                            <img class="btn-with-image" src="images/navigations/segment.png" alt="Segment" id="btn-segment" style="cursor: pointer;" />
                        </div>
                    </li>
                    <li>
                        <div class="is-flex is-flex-direction-row is-align-items-center mt-2 mb-2">
                            <img class="btn-with-image" src="images/navigations/droite.png" alt="Droite" id="btn-line" style="cursor: pointer;" />
                        </div>
                    </li>
                    <li>
                        <div class="is-flex is-flex-direction-row is-align-items-center mt-2 mb-2">
                            <img class="btn-with-image" src="images/navigations/parallèle.png" alt="Parallèle" id="btn-parallele" style="cursor: pointer;" />
                        </div>
                    </li>
                    <li>
                        <div class="is-flex is-flex-direction-row is-align-items-center mt-2 mb-2">
                            <img class="btn-with-image" src="images/navigations/perpendiculaire.png" alt="Perpendiculaire" id="btn-perpendiculaire" style="cursor: pointer;" />
                        </div>
                    </li>
                    <li>
                        <div class="is-flex is-flex-direction-row is-align-items-center mt-2 mb-2">
                            <img class="btn-with-image" src="images/navigations/milieu.png" alt="Milieu" id="btn-milieu" style="cursor: pointer;" />
                        </div>
                    </li>
                    <li>
                        <div class="is-flex is-flex-direction-row is-align-items-center mt-2 mb-2">
                            <img class="btn-with-image" src="images/navigations/cercle.png" alt="Cercle" id="btn-circle" style="cursor: pointer;" />
                        </div>
                    </li>
                    <li>
                        <div class="is-flex is-flex-direction-row is-align-items-center mt-2 mb-2">
                            <img class="btn-with-image" src="images/navigations/angle.png" alt="Angle" id="btn-angle" style="cursor: pointer;" />
                        </div>
                    </li>
                    <li>
                        <div class="is-flex is-flex-direction-row is-align-items-center mt-2 mb-2">
                            <img class="btn-with-image" src="images/navigations/polygone.png" alt="Polygone" id="btn-polygon" style="cursor: pointer;" />
                        </div>
                    </li>
                    <li>
                        <img class="btn-with-image" src="images/navigations/gomme.png" alt="Gomme" id="btn-gomme" style="cursor: pointer;" />
                    </li>
                    <li>
                        <div class="is-flex is-flex-direction-row is-align-items-center mt-2 mb-2">
                            <label for="color-picker" class="label">Couleur:</label>
                            <input type="color" id="color-picker" class="ml-2" value="#000000">
                        </div>
                    </li>
                    <li>
                        <div class="is-flex is-flex-direction-row is-align-items-center mt-2 mb-2">
                            <button id="btn-fill" class="button is-small">Remplir</button>
                        </div>
                    </li>
                </ul>
            </aside>
        </div>

        <!-- Zone de dessin -->
        <div class="column">
            <div class="buttons p-2">
                <button class="button is-small" id="btn-add">
                    <span class="icon is-small">
                        <i class="fas fa-plus"></i>
                    </span>
                    <span>Nouvelle page</span>
                </button>
                <button class="button is-small" id="btn-prev">
                    <span class="icon is-small">
                        <i class="fas fa-chevron-left"></i>
                    </span>
                    <span>Page précédente</span>
                </button>
                <button class="button is-small" id="btn-next">
                    <span class="icon is-small">
                        <i class="fas fa-chevron-right"></i>
                    </span>
                    <span>Page suivante</span>
                </button>
                <button class="button is-small" id="btn-export">
                    <span class="icon is-small">
                        <i class="fas fa-download"></i>
                    </span>
                    <span>Exporter en PDF</span>
                </button>
                <button class="button is-small" id="btn-import">
                    <span class="icon is-small">
                        <i class="fas fa-upload"></i>
                    </span>
                    <span>Importer un PDF</span>
                </button>
                <input type="file" id="pdf-input" accept="application/pdf" style="display: none;">
            </div>
            <div id="canvas-container" style="height: calc(100% - 50px); position: relative;">
                <canvas id="canvas"></canvas>
                <div id="text-input-container" style="display: none; position: absolute;">
                    <input type="text" id="text-input" class="input is-small">
                </div>
                <div id="angle-input-container" style="display: none; position: absolute;">
                    <input type="number" id="angle-input" class="input is-small" min="0" max="360" step="1">
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <script src="https://kit.fontawesome.com/your-font-awesome-kit.js" crossorigin="anonymous"></script>
</body>
</html>
